name: Drift Check
on:
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 8am UTC
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  load-projects:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.read.outputs.projects }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: echo "projects=$(jq -c '.projects' projects.json)" >> $GITHUB_OUTPUT

  check-drift:
    runs-on: ubuntu-latest
    needs: load-projects
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.load-projects.outputs.projects) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ matrix.project.repo }}
          path: project
          token: ${{ secrets.WORKFLOW_PAT }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyyaml
      - name: Run drift check
        id: drift
        run: |
          result=$(./tools/diff.sh --project project --json 2>&1) || true
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$result" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Open issue if drifted
        if: contains(steps.drift.outputs.report, 'BEHIND') || contains(steps.drift.outputs.report, 'DIVERGED')
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          DRIFT_REPORT: ${{ steps.drift.outputs.report }}
          PROJECT_REPO: ${{ matrix.project.repo }}
        with:
          github-token: ${{ secrets.WORKFLOW_PAT }}
          script: |
            const [owner, repo] = process.env.PROJECT_REPO.split('/');
            await github.rest.issues.create({
              owner, repo,
              title: 'Workflow drift detected against claude-workflow master',
              body: '```\n' + process.env.DRIFT_REPORT + '\n```\n\nRun `/sync-workflow --update` to sync.',
              labels: ['workflow-drift']
            });
      - name: Auto-promote LOCAL-EDIT files
        if: contains(steps.drift.outputs.report, 'LOCAL-EDIT')
        env:
          GH_TOKEN: ${{ github.token }}
          DRIFT_REPORT: ${{ steps.drift.outputs.report }}
          PROJECT_REPO: ${{ matrix.project.repo }}
        run: |
          python3 tools/auto_promote.py \
            --drift-json "$DRIFT_REPORT" \
            --project-dir project \
            --project-repo "$PROJECT_REPO"
