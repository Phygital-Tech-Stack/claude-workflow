name: Workflow Drift Check
on:
  pull_request:
    paths: ['.claude/**']
  schedule:
    - cron: '0 8 * * 1'

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyyaml
      - name: Fetch master workflow
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('.claude/workflow.lock'))['version'])")
          git clone --depth 1 --branch "v$VERSION" \
            https://github.com/Phygital-Tech-Stack/claude-workflow.git /tmp/master
      - name: Run drift check
        run: /tmp/master/tools/diff.sh --project . --master /tmp/master
      - name: Comment on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: 'Workflow drift detected. Run `/sync-workflow --check` for details.'
            });
